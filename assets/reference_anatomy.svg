<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#fbfaf7"/>
  <text x="600" y="62" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="34" font-weight="700" fill="#222">一条完整参考文献的结构</text>
  <text x="600" y="100" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="18" fill="#666">示例使用真实存在的 NeRF 会议论文；除作者姓名外，来源信息尽量写全</text>
  <g font-family="Microsoft YaHei, Arial">
    <rect x="62" y="132" width="1076" height="126" rx="16" fill="#ffffff" stroke="#d8d2c8"/>
    <text x="90" y="166" font-size="16" fill="#222">B. Mildenhall, P. P. Srinivasan, M. Tancik, J. T. Barron, R. Ramamoorthi, and R. Ng,</text>
    <text x="90" y="196" font-size="16" fill="#222">“NeRF: Representing Scenes as Neural Radiance Fields for View Synthesis,”</text>
    <text x="90" y="226" font-size="16" fill="#222">in Computer Vision – ECCV 2020: 16th European Conference, Proceedings, Part I, Springer, 2020,</text>
    <text x="90" y="246" font-size="16" fill="#222">pages 405–421, DOI: 10.1007/978-3-030-58452-8_24.</text>
    <g font-size="14" fill="#555">
      <line x1="170" y1="268" x2="170" y2="312" stroke="#b77" stroke-width="2"/>
      <rect x="70" y="312" width="200" height="58" rx="12" fill="#f4d4c8" stroke="#ce8e78"/>
      <text x="170" y="347" text-anchor="middle">作者 author</text>
      <line x1="475" y1="268" x2="475" y2="312" stroke="#8aa" stroke-width="2"/>
      <rect x="365" y="312" width="220" height="58" rx="12" fill="#d8e7e9" stroke="#86aeb5"/>
      <text x="475" y="347" text-anchor="middle">题名 title</text>
      <line x1="735" y1="268" x2="735" y2="312" stroke="#88a" stroke-width="2"/>
      <rect x="620" y="312" width="230" height="58" rx="12" fill="#d7e0f2" stroke="#91a6d4"/>
      <text x="735" y="347" text-anchor="middle">来源 source</text>
      <line x1="960" y1="268" x2="960" y2="312" stroke="#8a8" stroke-width="2"/>
      <rect x="895" y="312" width="130" height="58" rx="12" fill="#dcebd3" stroke="#94b36e"/>
      <text x="960" y="347" text-anchor="middle">DOI</text>
    </g>
    <rect x="110" y="445" width="280" height="132" rx="18" fill="#ffffff" stroke="#d8d2c8"/>
    <text x="250" y="480" text-anchor="middle" font-size="20" font-weight="700" fill="#222">会议论文</text>
    <text x="250" y="515" text-anchor="middle" font-size="15" fill="#555">写完整会议论文集名称</text>
    <text x="250" y="545" text-anchor="middle" font-size="15" fill="#555">有页码写页码；无页码写论文编号</text>
    <rect x="460" y="445" width="280" height="132" rx="18" fill="#ffffff" stroke="#d8d2c8"/>
    <text x="600" y="480" text-anchor="middle" font-size="20" font-weight="700" fill="#222">期刊论文</text>
    <text x="600" y="515" text-anchor="middle" font-size="15" fill="#555">期刊名、卷、期、页码/文章号</text>
    <text x="600" y="545" text-anchor="middle" font-size="15" fill="#555">期刊名称不随意缩写</text>
    <rect x="810" y="445" width="280" height="132" rx="18" fill="#ffffff" stroke="#d8d2c8"/>
    <text x="950" y="480" text-anchor="middle" font-size="20" font-weight="700" fill="#222">预印本/网页/软件</text>
    <text x="950" y="515" text-anchor="middle" font-size="15" fill="#555">写编号、版本、URL、访问日期</text>
    <text x="950" y="545" text-anchor="middle" font-size="15" fill="#555">优先引用正式发表版本</text>
    <text x="600" y="670" text-anchor="middle" font-size="17" fill="#555">完整参考文献 = 作者 + 时间 + 题名 + 来源 + 定位信息 + 持久标识符。</text>
  </g>
</svg>
